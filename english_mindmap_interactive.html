*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f6f2;--bg3:#f1efe8;

  --border:rgba(0,0,0,0.1);
  --modal-bg:#fff;--modal-overlay:rgba(0,0,0,0.35);
  --teal50:#E1F5EE;--teal600:#0F6E56;--teal800:#085041;
  --coral50:#FAECE7;--coral600:#993C1D;--coral800:#4A1B0C;
  --purple50:#EEEDFE;--purple600:#534AB7;--purple800:#26215C;
  --amber50:#FAEEDA;--amber600:#854F0B;--amber800:#412402;
  --blue50:#E6F1FB;--blue600:#185FA5;--blue800:#042C53;
  --gray50:#F1EFE8;--gray600:#5F5E5A;--gray800:#2C2C2A;
}
.dark{
  --bg:#1a1a18;--bg2:#252523;--bg3:#2c2c2a;
  --text:#e8e6df;--text2:#9c9a92;--text3:#6b6a64;
  --border:rgba(255,255,255,0.1);
  --modal-bg:#252523;--modal-overlay:rgba(0,0,0,0.6);
  --teal50:#085041;--teal600:#5DCAA5;--teal800:#E1F5EE;
  --coral50:#4A1B0C;--coral600:#F0997B;--coral800:#FAECE7;
  --purple50:#26215C;--purple600:#AFA9EC;--purple800:#EEEDFE;
  --amber50:#412402;--amber600:#FAC775;--amber800:#FAEEDA;
  --blue50:#042C53;--blue600:#85B7EB;--blue800:#E6F1FB;
  --gray50:#2C2C2A;--gray600:#B4B2A9;--gray800:#F1EFE8;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans,sans-serif);transition:background .25s,color .25s}

.top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:0.5px solid var(--border)}
.top-title{font-size:15px;font-weight:500;color:var(--text)}
.mode-btn{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);background:var(--bg2);border:0.5px solid var(--border);border-radius:20px;padding:5px 12px;cursor:pointer;transition:background .2s}
.mode-btn:hover{background:var(--bg3)}

.map-wrap{padding:20px 16px 0;overflow-x:auto}
svg.map{display:block;width:100%;overflow:visible}

.node-card{cursor:pointer;transition:opacity .15s}
.node-card:hover rect{filter:brightness(0.96)}
.node-card:hover .ncircle{filter:brightness(0.96)}

.legend{display:flex;flex-wrap:wrap;gap:8px 16px;padding:14px 16px;border-top:0.5px solid var(--border);margin-top:4px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

.overlay{position:relative;min-height:1px}
.modal-wrap{display:none;position:relative;z-index:10;padding:0 16px 16px}
.modal-wrap.open{display:block}
.modal{background:var(--modal-bg);border:0.5px solid var(--border);border-radius:14px;overflow:hidden}
.modal-head{padding:14px 16px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;border-bottom:0.5px solid var(--border)}
.modal-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.4}
.modal-close{background:var(--bg2);border:0.5px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;font-size:13px;padding:3px 8px;flex-shrink:0;line-height:1}
.modal-close:hover{background:var(--bg3)}
.modal-body{padding:14px 16px}
.info-row{display:flex;gap:6px;align-items:flex-start;margin-bottom:10px;font-size:13px;line-height:1.6;color:var(--text)}
.info-row:last-child{margin-bottom:0}
.info-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:6px}
.badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:6px}
</style>

let isDark = false;

function toggleMode(){
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  document.getElementById('modeLabel').textContent = isDark ? '라이트 모드' : '다크 모드';
}

function openModal(key){
  const d = DATA[key];
  if(!d) return;
  document.getElementById('modalTitle').textContent = d.title;
  let html = d.items.map(t=>`<div class="info-row"><div class="info-dot" style="background:${d.dot}"></div><div>${t}</div></div>`).join('');
  if(d.badges && d.badges.length){
    html += '<div class="badges">' + d.badges.map(b=>`<span class="badge" style="background:${b.bg};color:${b.fg}">${b.text}</span>`).join('') + '</div>';
  }
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalWrap').classList.add('open');
  document.getElementById('modalWrap').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function closeModal(){
  document.getElementById('modalWrap').classList.remove('open');
}

function drawConnectors(){
  const svg = document.getElementById('mapSvg');
  const g = document.getElementById('svgConnectors');
  g.innerHTML = '';
  function line(x1,y1,x2,y2,col){
    const l = document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x1); l.setAttribute('y1',y1);
    l.setAttribute('x2',x2); l.setAttribute('y2',y2);
    l.setAttribute('stroke',col); l.setAttribute('stroke-width','1');
    l.setAttribute('fill','none');
    g.appendChild(l);
  }
  const teal='#1D9E75', coral='#D85A30', purple='#7F77DD', amber='#BA7517', blue='#378ADD', gray='#888780';
  line(210,41,146,128,gray);
  line(430,41,494,128,gray);
  line(320,64,250,538,gray);
  line(320,64,390,538,gray);
  line(320,430,320,64,blue);
  line(81,146,83,176,teal);
  line(81,146,83,232,teal);
  line(81,146,83,288,teal);
  line(81,146,83,344,teal);
  line(81,146,83,400,teal);
  line(81,146,83,456,teal);
  line(559,146,557,176,coral);
  line(559,146,557,232,coral);
  line(559,146,557,288,coral);
  line(559,146,557,344,coral);
  line(250,556,175,582,purple);
  line(250,556,335,582,purple);
  line(390,556,495,582,amber);
}

drawConnectors();
