<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>뇌 건강 관리 프로그램</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
:root{--bg:#e0e5ec;--text:#31456a;--text2:#6b7a99;--accent:#4a90d9;--accent2:#3578c4;--green:#27ae60;--red:#e74c3c;--yellow:#f39c12;--sl:rgba(255,255,255,0.9);--sd:rgba(163,177,198,0.7);--ns:6px 6px 14px var(--sd),-6px -6px 14px var(--sl);--ni:inset 4px 4px 10px var(--sd),inset -4px -4px 10px var(--sl);--nb:4px 4px 10px var(--sd),-4px -4px 10px var(--sl);--np:inset 3px 3px 7px var(--sd),inset -3px -3px 7px var(--sl);--r:18px;--rs:12px;--fn:'Noto Sans KR',sans-serif;--tr:0.2s ease}
[data-theme="dark"]{--bg:#1e2330;--text:#c8d4f0;--text2:#6b7ea8;--sl:rgba(46,55,80,0.8);--sd:rgba(10,12,20,0.9)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;min-height:100vh;background:var(--bg);font-family:var(--fn);color:var(--text);transition:background var(--tr),color var(--tr);overflow-x:hidden}
#app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg)}
.screen{display:none;flex-direction:column;width:100%;min-height:100vh;padding:0 0 80px}
.screen.active{display:flex}
.hdr{background:var(--bg);padding:20px 20px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr-t{font-size:18px;font-weight:700;color:var(--text)}
.hdr-s{font-size:12px;color:var(--text2);margin-top:2px}
.tbtn{width:46px;height:26px;background:var(--bg);border:none;border-radius:13px;box-shadow:var(--ni);position:relative;cursor:pointer;transition:all var(--tr);flex-shrink:0}
[data-theme="light"] .tbtn::after{content:'☀';left:3px}
[data-theme="dark"] .tbtn::after{content:'🌙';left:23px}
.tbtn::after{position:absolute;width:20px;height:20px;border-radius:50%;top:3px;background:var(--accent);box-shadow:2px 2px 5px var(--sd);transition:all var(--tr);display:flex;align-items:center;justify-content:center;font-size:11px;color:white;line-height:20px;text-align:center}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:16px 16px 8px}
.stat{background:var(--bg);border-radius:var(--rs);box-shadow:var(--ns);padding:14px 8px;text-align:center}
.sv{font-size:22px;font-weight:700;color:var(--accent)}
.sl{font-size:11px;color:var(--text2);margin-top:3px}
.sec{font-size:13px;font-weight:700;color:var(--text2);padding:16px 20px 8px;letter-spacing:1px}
.ggrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:0 16px}
.gcard{background:var(--bg);border-radius:var(--r);box-shadow:var(--ns);padding:16px 12px;cursor:pointer;transition:box-shadow var(--tr),transform 0.1s;position:relative}
.gcard:active{box-shadow:var(--np);transform:scale(0.97)}
.gcard.done::before{content:'✓';position:absolute;top:8px;right:10px;font-size:14px;color:var(--green);font-weight:700}
.gico{width:44px;height:44px;border-radius:14px;background:var(--bg);box-shadow:var(--ns);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:10px}
.gnm{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.gds{font-size:11px;color:var(--text2);line-height:1.5}
.gbdg{font-size:11px;color:var(--green);font-weight:700;margin-top:8px}
.nbtn{background:var(--bg);border:none;border-radius:var(--rs);box-shadow:var(--nb);padding:12px 20px;font-size:14px;font-weight:700;color:var(--text);cursor:pointer;transition:all var(--tr);font-family:var(--fn)}
.nbtn:active{box-shadow:var(--np);transform:scale(0.97)}
.nbtn.blk{width:100%;display:block;margin-top:10px}
.nbtn.acc{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;box-shadow:4px 4px 12px rgba(74,144,217,0.4),-2px -2px 8px var(--sl)}
.nbtn.acc:active{box-shadow:inset 3px 3px 8px rgba(0,0,0,0.3)}
.ninp{width:100%;background:var(--bg);border:none;border-radius:var(--rs);box-shadow:var(--ni);padding:14px 16px;font-size:16px;color:var(--text);font-family:var(--fn);outline:none}
.ninp:focus{box-shadow:var(--ni),0 0 0 2px var(--accent)}
.tgl{width:52px;height:28px;background:var(--bg);border:none;border-radius:14px;box-shadow:var(--ni);position:relative;cursor:pointer;transition:all var(--tr)}
.tgl::after{content:'';position:absolute;width:22px;height:22px;border-radius:50%;top:3px;left:3px;background:var(--text2);box-shadow:2px 2px 5px var(--sd);transition:all var(--tr)}
.tgl.on::after{left:27px;background:var(--green)}
.tchips{display:flex;flex-wrap:wrap;gap:8px;padding:8px 16px 16px}
.tchip{background:var(--bg);border:none;border-radius:20px;box-shadow:var(--nb);padding:8px 16px;font-size:13px;font-weight:700;color:var(--accent);cursor:pointer;transition:all var(--tr);font-family:var(--fn)}
.tchip:active{box-shadow:var(--np)}
.twrap{display:flex;align-items:center;justify-content:space-between;padding:14px 16px}
.logw{padding:0 16px}
.logi{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(127,127,127,0.1);font-size:13px}
.logi:last-child{border-bottom:none}
.loge{text-align:center;padding:24px;color:var(--text2);font-size:13px}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg);box-shadow:0 -4px 20px rgba(0,0,0,0.1);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nvb{flex:1;background:none;border:none;padding:12px 4px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:var(--fn);transition:all var(--tr)}
.nvi{width:36px;height:36px;border-radius:12px;background:var(--bg);box-shadow:var(--nb);display:flex;align-items:center;justify-content:center;font-size:18px;transition:all var(--tr)}
.nvb.active .nvi{background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:3px 3px 8px rgba(74,144,217,0.4)}
.nvl{font-size:10px;color:var(--text2);font-weight:500}
.nvb.active .nvl{color:var(--accent);font-weight:700}
/* GAME SCREEN */
#gscreen{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;flex-direction:column;overflow:hidden}
#gscreen.active{display:flex}
.ghdr{display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--bg);flex-shrink:0}
.bbtn{width:40px;height:40px;border-radius:12px;background:var(--bg);border:none;box-shadow:var(--nb);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--tr)}
.bbtn:active{box-shadow:var(--np)}
.gtitle{font-size:18px;font-weight:700;color:var(--text)}
.gbody{flex:1;display:flex;flex-direction:column;overflow-y:auto;padding:16px 20px 20px}
/* RESULT */
#rscreen{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;padding:20px}
#rscreen.active{display:flex}
.rcard{background:var(--bg);border-radius:28px;box-shadow:var(--ns);padding:32px 24px;width:100%;max-width:340px;text-align:center}
.remo{font-size:56px;margin-bottom:12px}
.rsco{font-size:40px;font-weight:700;color:var(--accent)}
.rmsg{font-size:15px;color:var(--text2);margin-top:8px}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:white;padding:12px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;display:none;box-shadow:4px 4px 12px rgba(74,144,217,0.4);max-width:90vw;white-space:nowrap}
.pwrap{background:var(--bg);border-radius:6px;box-shadow:var(--ni);height:10px;overflow:hidden;margin:12px 0}
.pbar{height:10px;border-radius:6px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width 0.5s ease}
/* MEMORY GAME - FULLSCREEN BUTTONS */
.mem-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;flex:1}
.mem-btn{border:none;border-radius:var(--r);box-shadow:var(--ns);cursor:pointer;font-size:20px;font-weight:700;color:white;transition:all 0.15s;font-family:var(--fn);min-height:120px}
.mem-btn:active{box-shadow:var(--np);transform:scale(0.97)}
/* SUDOKU */
.sudo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:0 auto 16px}
.sudo-cell{aspect-ratio:1;text-align:center;font-size:22px;font-weight:700;border:none;border-radius:10px;background:var(--bg);box-shadow:var(--ni);color:var(--text);font-family:var(--fn);outline:none}
.sudo-cell[readonly]{box-shadow:var(--ns);color:var(--accent)}
/* REACTION */
.rbox{border-radius:var(--r);box-shadow:var(--ns);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:24px;font-weight:700;transition:background 0.1s;user-select:none;flex:1;min-height:160px}
/* PITCH */
.pitch-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px}
.pnote{border:none;border-radius:var(--rs);box-shadow:var(--ns);font-size:18px;font-weight:700;color:white;cursor:pointer;aspect-ratio:1;transition:all 0.15s;font-family:var(--fn);display:flex;align-items:center;justify-content:center}
.pnote:active{box-shadow:var(--np);transform:scale(0.93)}
/* SOUND MATCH */
.scards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.scard{aspect-ratio:1;border-radius:var(--rs);background:var(--bg);box-shadow:var(--ns);display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;transition:all 0.15s;border:none}
.scard:active{box-shadow:var(--np);transform:scale(0.95)}
.scard.flip{background:var(--accent);color:white;box-shadow:3px 3px 10px rgba(74,144,217,0.4)}
.scard.match{background:var(--green);color:white;box-shadow:3px 3px 10px rgba(39,174,96,0.4)}
/* HAND */
.hand-ico{font-size:80px;text-align:center;margin:16px 0;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
/* NOTIF CARD */
.ncrd{background:var(--bg);border-radius:var(--r);box-shadow:var(--ns);overflow:hidden;margin-bottom:16px}
/* UTIL */
.c{text-align:center}.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}
.ts{font-size:13px}.tx{font-size:11px}.tl{font-size:18px}.txx{font-size:28px}.t2x{font-size:36px}
.tc{color:var(--text2)}.ta{color:var(--accent)}.tg{color:var(--green)}.tr2{color:var(--red)}.bo{font-weight:700}
.msgb{text-align:center;padding:10px;border-radius:var(--rs);font-size:14px;font-weight:700;min-height:40px}
</style>
</head>
<body>
<div id="app">
<div id="toast"></div>

<!-- HOME -->
<div id="sc-home" class="screen active">
  <div class="hdr">
    <div><div class="hdr-t">🧠 뇌 건강 관리</div><div class="hdr-s" id="today-date"></div></div>
    <button class="tbtn" onclick="toggleTheme()"></button>
  </div>
  <div class="stats">
    <div class="stat"><div class="sv" id="st-done">0/6</div><div class="sl">오늘 완료</div></div>
    <div class="stat"><div class="sv" id="st-streak">0일</div><div class="sl">연속 일수</div></div>
    <div class="stat"><div class="sv" id="st-total">0</div><div class="sl">총 완료</div></div>
  </div>
  <div class="sec">오늘의 두뇌 운동</div>
  <div class="ggrid" id="game-grid"></div>
  <div style="height:16px"></div>
</div>

<!-- SETTINGS -->
<div id="sc-settings" class="screen">
  <div class="hdr">
    <div><div class="hdr-t">⚙️ 설정</div><div class="hdr-s">알림 및 테마</div></div>
    <button class="tbtn" onclick="toggleTheme()"></button>
  </div>
  <div style="padding:0 16px">
    <div class="ncrd">
      <div class="twrap"><span style="font-size:14px;font-weight:500">매일 알림</span><button class="tgl" id="ntgl" onclick="toggleNotif(this)"></button></div>
      <div style="padding:0 16px 8px;font-size:12px;color:var(--text2)">탭하면 삭제됩니다</div>
      <div class="tchips" id="ntimes"></div>
      <div style="padding:0 16px 16px"><button class="nbtn blk" onclick="addTime()">+ 시간 추가</button></div>
    </div>
    <div class="ncrd">
      <div style="padding:16px;font-size:14px;font-weight:700">테마</div>
      <div style="display:flex;gap:12px;padding:0 16px 16px">
        <button class="nbtn" style="flex:1" onclick="setTheme('light')">☀️ 라이트</button>
        <button class="nbtn" style="flex:1" onclick="setTheme('dark')">🌙 다크</button>
      </div>
    </div>
    <div class="ncrd">
      <div style="padding:16px;font-size:14px;font-weight:700">데이터</div>
      <div style="padding:0 16px 16px"><button class="nbtn blk" style="color:var(--red)" onclick="resetData()">기록 초기화</button></div>
    </div>
  </div>
</div>

<!-- LOG -->
<div id="sc-log" class="screen">
  <div class="hdr">
    <div><div class="hdr-t">📋 실행 기록</div><div class="hdr-s">최근 활동</div></div>
    <button class="tbtn" onclick="toggleTheme()"></button>
  </div>
  <div class="logw" id="log-list"></div>
  <div id="log-empty" class="loge">아직 기록이 없습니다 🌱</div>
</div>

<!-- GAME SCREEN -->
<div id="gscreen">
  <div class="ghdr">
    <button class="bbtn" onclick="closeGame()">←</button>
    <div class="gtitle" id="gtitle"></div>
  </div>
  <div class="gbody" id="gbody"></div>
</div>

<!-- RESULT -->
<div id="rscreen">
  <div class="rcard">
    <div class="remo" id="remo">🎉</div>
    <div class="rsco" id="rsco">100점</div>
    <div class="rmsg" id="rmsg">훌륭해요!</div>
    <button class="nbtn acc blk" style="margin-top:24px" onclick="closeResult()">확인</button>
  </div>
</div>

<!-- NAV -->
<nav class="bnav">
  <button class="nvb active" id="nv-home" onclick="showTab('home')"><div class="nvi">🏠</div><span class="nvl">홈</span></button>
  <button class="nvb" id="nv-settings" onclick="showTab('settings')"><div class="nvi">⚙️</div><span class="nvl">설정</span></button>
  <button class="nvb" id="nv-log" onclick="showTab('log')"><div class="nvi">📋</div><span class="nvl">기록</span></button>
</nav>
</div>

<script>
const GAMES=[
  {id:'memory',   name:'색상 기억',   icon:'🎨',desc:'색깔·소리 순서를 기억하고 따라 클릭'},
  {id:'math',     name:'두뇌 산수',   icon:'🧮',desc:'덧셈·뺄셈·곱셈 5문제 도전'},
  {id:'hand',     name:'손 운동',     icon:'✋',desc:'화면 지시에 따라 손가락 운동'},
  {id:'reaction', name:'반응 속도',   icon:'⚡',desc:'초록불이 켜지면 즉시 탭하세요'},
  {id:'pitch',    name:'음정 맞추기', icon:'🎵',desc:'들려주는 음과 같은 음을 골라보세요'},
  {id:'soundmatch',name:'소리 기억', icon:'🔊',desc:'같은 소리 카드 짝 맞추기'},
  {id:'stroop',   name:'스트룹 게임', icon:'🔤',desc:'글자 색깔을 골라요 (글자 내용 무시)'},
  {id:'echo',     name:'메아리 게임', icon:'🔁',desc:'들려주는 소리가 몇 번인지 세어보세요'},
];
const DEF_TIMES=['09:00','13:00','19:00'];
let S={done:[],log:[],streak:0,total:0,times:[...DEF_TIMES],notifOn:true};
try{const s=localStorage.getItem('bh_v3');if(s)S=JSON.parse(s);}catch(e){}
const savedTheme=localStorage.getItem('bh_theme')||'light';
document.documentElement.setAttribute('data-theme',savedTheme);
function save(){try{localStorage.setItem('bh_v3',JSON.stringify(S));}catch(e){}}
function today(){return new Date().toISOString().slice(0,10)}
function toggleTheme(){setTheme(document.documentElement.getAttribute('data-theme')==='light'?'dark':'light')}
function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('bh_theme',t)}
function showTab(t){['home','settings','log'].forEach(x=>{document.getElementById('sc-'+x).classList.toggle('active',x===t);document.getElementById('nv-'+x).classList.toggle('active',x===t)});if(t==='log')renderLog()}
function init(){
  document.getElementById('today-date').textContent=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  checkStreak();renderGames();renderStats();renderTimes();updateNtgl();
  setInterval(checkAlerts,30000);checkAlerts();
}
function checkStreak(){const t=today(),y=new Date(Date.now()-86400000).toISOString().slice(0,10);if(!S.log.some(l=>l.date===t)&&!S.log.some(l=>l.date===y)&&S.streak>0){S.streak=0;save()}}
function renderStats(){const t=today(),n=S.log.filter(l=>l.date===t).length;document.getElementById('st-done').textContent=n+'/'+GAMES.length;document.getElementById('st-streak').textContent=S.streak+'일';document.getElementById('st-total').textContent=S.total}
function renderGames(){const t=today(),done=S.log.filter(l=>l.date===t).map(l=>l.id);document.getElementById('game-grid').innerHTML=GAMES.map(g=>`<div class="gcard ${done.includes(g.id)?'done':''}" onclick="openGame('${g.id}')"><div class="gico">${g.icon}</div><div class="gnm">${g.name}</div><div class="gds">${g.desc}</div>${done.includes(g.id)?'<div class="gbdg">✓ 완료!</div>':''}</div>`).join('')}
function renderLog(){const list=document.getElementById('log-list'),empty=document.getElementById('log-empty'),recent=[...S.log].reverse().slice(0,30);if(!recent.length){list.innerHTML='';empty.style.display='block';return}empty.style.display='none';list.innerHTML=recent.map(l=>{const g=GAMES.find(x=>x.id===l.id);return`<div class="logi"><span>${g?g.icon:''} ${l.name}</span><div style="text-align:right"><div style="color:var(--green);font-weight:700">${l.score}</div><div style="font-size:11px;color:var(--text2)">${l.date} ${l.time}</div></div></div>`}).join('')}
function renderTimes(){document.getElementById('ntimes').innerHTML=S.times.map(t=>`<button class="tchip" onclick="rmTime('${t}')" title="탭하면 삭제">${t}</button>`).join('')}
function addTime(){const t=prompt('알림 시간 입력 (예: 08:30)');if(t&&/^\d{2}:\d{2}$/.test(t)&&!S.times.includes(t)){S.times.push(t);S.times.sort();save();renderTimes()}}
function rmTime(t){S.times=S.times.filter(x=>x!==t);save();renderTimes()}
function updateNtgl(){const b=document.getElementById('ntgl');if(b)b.classList.toggle('on',S.notifOn)}
function toggleNotif(b){S.notifOn=!S.notifOn;save();b.classList.toggle('on',S.notifOn)}
function resetData(){if(!confirm('모든 기록을 초기화할까요?'))return;S={done:[],log:[],streak:0,total:0,times:[...DEF_TIMES],notifOn:true};save();renderGames();renderStats();renderLog();toast('초기화 완료!')}
let lastAlm='';
function checkAlerts(){if(!S.notifOn)return;const now=new Date(),hm=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');if(S.times.includes(hm)&&hm!==lastAlm){lastAlm=hm;toast('🔔 두뇌 운동 시간이에요!')}}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.display='block';setTimeout(()=>el.style.display='none',3500)}

function openGame(id){
  const g=GAMES.find(x=>x.id===id);
  document.getElementById('gscreen').classList.add('active');
  document.getElementById('gtitle').textContent=g.icon+' '+g.name;
  const body=document.getElementById('gbody');body.innerHTML='';
  if(id==='memory')renderMemory(g,body);
  else if(id==='math')renderMath(g,body);
  else if(id==='hand')renderHand(g,body);
  else if(id==='reaction')renderReaction(g,body);
  else if(id==='pitch')renderPitch(g,body);
  else if(id==='soundmatch')renderSoundMatch(g,body);
  else if(id==='stroop')renderStroop(g,body);
  else if(id==='echo')renderEcho(g,body);
}
function closeGame(){document.getElementById('gscreen').classList.remove('active');if(window._AC){window._AC();window._AC=null}}
function addLog(g,score){
  const t=today();if(S.log.some(l=>l.date===t&&l.id===g.id))return;
  const now=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  S.log.push({id:g.id,name:g.name,date:t,time:now,score});S.total++;
  const n=S.log.filter(l=>l.date===t).length;
  if(n===1){const y=new Date(Date.now()-86400000).toISOString().slice(0,10);S.streak=S.log.some(l=>l.date===y)?S.streak+1:1}
  if(n===GAMES.length)toast('🎉 오늘 모든 운동 완료!');
  save();renderStats();renderGames();
}
function showResult(g,score,msg,emoji='🎉'){
  addLog(g,score);
  document.getElementById('remo').textContent=emoji;
  document.getElementById('rsco').textContent=score;
  document.getElementById('rmsg').textContent=msg;
  document.getElementById('rscreen').classList.add('active');
}
function closeResult(){document.getElementById('rscreen').classList.remove('active');closeGame()}

/* AUDIO */
function ac(){if(!window._audioCtx)window._audioCtx=new(window.AudioContext||window.webkitAudioContext)();return window._audioCtx}
function playT(freq,dur=250,type='sine',vol=0.3){const a=ac(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur/1000);o.start();o.stop(a.currentTime+dur/1000)}
function playOK(){playT(523,120);setTimeout(()=>playT(659,120),130);setTimeout(()=>playT(784,250),260)}
function playNG(){playT(200,350,'sawtooth',0.2)}
function playClick(i){const f=[330,440,550,660];playT(f[i%4],200,'triangle')}

/* GAME 1: MEMORY - FULLSCREEN BUTTONS */
function renderMemory(g,body){
  const colors=[{c:'#e74c3c',n:'빨강'},{c:'#3498db',n:'파랑'},{c:'#27ae60',n:'초록'},{c:'#f39c12',n:'노랑'}];
  const freqs=[330,440,550,660];
  let seq=[],userSeq=[],level=1,showing=false;
  // Build fullscreen layout
  body.style.padding='12px';
  body.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div id="mem-msg" style="font-size:14px;color:var(--text2);font-weight:500">시작 버튼을 눌러주세요</div>
      <div style="font-size:14px;font-weight:700;color:var(--accent)">Lv.<span id="mem-lv">1</span></div>
    </div>
    <div class="mem-grid" id="mem-grid">
      ${colors.map((c,i)=>`<button class="mem-btn" id="mb${i}" onclick="window._mClick(${i})" style="background:${c.c}">${c.n}</button>`).join('')}
    </div>
    <button class="nbtn acc blk" style="margin-top:12px;flex-shrink:0" onclick="window._mStart()">▶ 시작</button>`;
  function sm(m){const el=document.getElementById('mem-msg');if(el)el.textContent=m}
  function slv(l){const el=document.getElementById('mem-lv');if(el)el.textContent=l}
  function flash(i,cb){const b=document.getElementById('mb'+i);if(!b)return cb&&cb();b.style.filter='brightness(2)';b.style.transform='scale(0.95)';playT(freqs[i],300,'sine');setTimeout(()=>{b.style.filter='';b.style.transform='';cb&&cb()},400)}
  function setBtns(on){colors.forEach((_,i)=>{const b=document.getElementById('mb'+i);if(b)b.style.pointerEvents=on?'auto':'none'})}
  function showSeq(){showing=true;setBtns(false);let i=0;function nxt(){if(i>=seq.length){showing=false;setBtns(true);sm('이제 순서대로 탭!');return}flash(seq[i],()=>{i++;setTimeout(nxt,200)})}setTimeout(nxt,600)}
  function addStep(){seq.push(Math.floor(Math.random()*4));userSeq=[];sm('잘 봐요!');showSeq()}
  window._mStart=()=>{seq=[];userSeq=[];level=1;slv(1);addStep()};
  window._mClick=(i)=>{if(showing)return;flash(i);userSeq.push(i);const pos=userSeq.length-1;if(userSeq[pos]!==seq[pos]){playNG();sm('틀렸어요! 다시 시작...');setTimeout(()=>{seq=[];userSeq=[];level=1;slv(1);setTimeout(addStep,800)},1200);return}if(userSeq.length===seq.length){level++;slv(level);sm('정답! 레벨 '+level+'...');if(level>7){showResult(g,'레벨 '+level,'색상 기억력이 뛰어나요!','🎨');return}setTimeout(addStep,900)}};
}

/* GAME 2: MATH */
function renderMath(g,body){
  const ops=['+','-','×'];let qs=[],idx=0,score=0;
  function mq(){const op=ops[Math.floor(Math.random()*3)];let a=Math.floor(Math.random()*15)+2,b=Math.floor(Math.random()*9)+1;if(op==='-'&&b>a)[a,b]=[b,a];return{q:`${a} ${op} ${b} = ?`,ans:op==='+'?a+b:op==='-'?a-b:a*b}}
  for(let i=0;i<5;i++)qs.push(mq());
  function render(){const q=qs[idx];body.innerHTML=`
    <div class="c ts tc">${idx+1} / 5</div>
    <div class="pwrap mt8"><div class="pbar" style="width:${idx/5*100}%"></div></div>
    <div class="c t2x bo mt20" style="color:var(--text);font-size:40px">${q.q}</div>
    <input type="number" id="mi" class="ninp mt20" placeholder="답 입력" style="text-align:center;font-size:22px">
    <button class="nbtn acc blk mt12" onclick="window._mc()">확인</button>
    <div class="msgb mt8" id="mm"></div>`;
    setTimeout(()=>{const e=document.getElementById('mi');if(e)e.focus()},100)}
  render();
  window._mc=()=>{const inp=document.getElementById('mi'),val=parseInt(inp.value),m=document.getElementById('mm');if(isNaN(val)){m.textContent='숫자를 입력하세요';return}if(val===qs[idx].ans){score++;playOK();m.textContent='정답! ✓';m.style.color='var(--green)'}else{playNG();m.textContent='정답: '+qs[idx].ans;m.style.color='var(--red)'}setTimeout(()=>{idx++;if(idx>=5)showResult(g,score+'/5점',score>=4?'계산 능력이 탁월해요!':'꾸준히 연습해봐요!','🧮');else render()},1000)};
}

/* GAME 3: HAND */
function renderHand(g,body){
  const exs=[{name:'주먹 쥐기',desc:'손을 꽉 쥐어보세요',icon:'✊',dur:4},{name:'손가락 벌리기',desc:'손가락을 최대한 넓게 펼치세요',icon:'✋',dur:4},{name:'엄지 돌리기',desc:'엄지손가락을 크게 원을 그리며 돌려요',icon:'👍',dur:5},{name:'손목 돌리기',desc:'손목을 천천히 좌우로 돌려요',icon:'🔄',dur:5},{name:'손가락 차례로',desc:'엄지→검지→중지→약지→새끼 순서로',icon:'🖐',dur:6}];
  let idx=0,tmr=null,rem=0;
  function re(){const ex=exs[idx];rem=ex.dur;body.innerHTML=`
    <div class="c ts tc">${idx+1} / ${exs.length}</div>
    <div class="pwrap mt8"><div class="pbar" style="width:${idx/exs.length*100}%"></div></div>
    <div class="hand-ico">${ex.icon}</div>
    <div class="c bo tl">${ex.name}</div>
    <div class="c ts tc mt8">${ex.desc}</div>
    <div class="c mt20" style="font-size:52px;font-weight:700;color:var(--accent)" id="et">${rem}초</div>
    <div class="pwrap mt12"><div id="eb" style="height:10px;border-radius:6px;background:linear-gradient(90deg,var(--accent),var(--green));width:100%;transition:width 1s linear"></div></div>`;
    clearInterval(tmr);tmr=setInterval(()=>{rem--;const t=document.getElementById('et'),b=document.getElementById('eb');if(t)t.textContent=rem+'초';if(b)b.style.width=(rem/ex.dur*100)+'%';playT(440,80,'sine',0.1);if(rem<=0){clearInterval(tmr);idx++;if(idx>=exs.length)showResult(g,'완료!','손 운동 완벽히 마쳤어요!','✋');else setTimeout(re,600)}},1000)}
  window._AC=()=>clearInterval(tmr);re();
}

/* GAME 4: REACTION */
function renderReaction(g,body){
  let round=0,total=5,times=[],waiting=false,started=false,t0=0,tmr=null;
  function render(){body.innerHTML=`
    <div class="c ts tc">신호가 <b style="color:var(--green)">초록색</b>으로 바뀌면 즉시 탭! (${total}회)</div>
    <div id="rbox" class="rbox mt12" onclick="window._rtap()" style="background:${started?'#e74c3c':'var(--bg)'};color:${started?'white':'var(--text2)'}">${started?'준비 중...':'시작 버튼을 누르세요'}</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin:12px 0">${times.map(t=>`<span style="background:var(--bg);box-shadow:var(--nb);border-radius:20px;padding:6px 12px;font-size:12px">${t}ms</span>`).join('')}</div>
    ${!started?`<button class="nbtn acc blk" onclick="window._rstart()">▶ 시작</button>`:''}`;
  }
  window._rstart=()=>{started=true;round=0;times=[];nextR()};
  function nextR(){const b=document.getElementById('rbox');if(!b)return;b.style.background='#e74c3c';b.textContent='잠깐만요...';b.style.color='white';waiting=false;const d=1500+Math.random()*2000;tmr=setTimeout(()=>{const bb=document.getElementById('rbox');if(!bb)return;bb.style.background='#27ae60';bb.textContent='지금!';t0=Date.now();waiting=true;playT(880,100,'square')},d)}
  render();
  window._rtap=()=>{if(!started)return;if(!waiting){const b=document.getElementById('rbox');if(b){b.style.background='#e74c3c';b.textContent='너무 빨랐어요!'}clearTimeout(tmr);playNG();setTimeout(nextR,1000);return}const ms=Date.now()-t0;times.push(ms);waiting=false;round++;playOK();if(round>=total){const avg=Math.round(times.reduce((a,b)=>a+b,0)/times.length);showResult(g,'평균 '+avg+'ms',avg<400?'반응 속도가 빠르네요!':'꾸준히 연습해요!','⚡')}else{render();nextR()}};
  window._AC=()=>clearTimeout(tmr);
}

/* GAME 5: PITCH */
function renderPitch(g,body){
  const notes=[{n:'도',f:261,c:'#e74c3c'},{n:'레',f:294,c:'#e67e22'},{n:'미',f:330,c:'#f1c40f'},{n:'파',f:349,c:'#27ae60'},{n:'솔',f:392,c:'#3498db'},{n:'라',f:440,c:'#9b59b6'},{n:'시',f:494,c:'#1abc9c'}];
  let round=0,total=7,score=0,target=null;
  function render(){const sh=[...notes].sort(()=>Math.random()-0.5);target=sh[Math.floor(Math.random()*sh.length)];body.innerHTML=`
    <div class="c ts tc">${round+1} / ${total}</div>
    <div class="pwrap mt8"><div class="pbar" style="width:${round/total*100}%"></div></div>
    <div class="c mt20"><button class="nbtn acc" style="font-size:18px;padding:18px 40px" onclick="window._pp()">🔊 소리 듣기</button></div>
    <div class="c ts tc mt16">같은 음을 고르세요</div>
    <div class="pitch-grid mt8">${sh.map(n=>`<button class="pnote" style="background:${n.c}" onclick="window._pk('${n.n}',${n.f})">${n.n}</button>`).join('')}</div>
    <div class="msgb mt12" id="pm"></div>`;
    window._pp=()=>playT(target.f,600,'sine');window._pp();
  }
  render();
  window._pk=(name,freq)=>{const m=document.getElementById('pm');if(name===target.n){score++;playOK();m.textContent='정답! '+target.n+' ('+target.f+'Hz)';m.style.color='var(--green)'}else{playNG();m.textContent='틀렸어요. 정답: '+target.n;m.style.color='var(--red)'}round++;setTimeout(()=>{if(round>=total)showResult(g,score+'/'+total+'점',score>=5?'음감이 뛰어나요!':'꾸준히 연습해요!','🎵');else render()},1200)};
}

/* GAME 6: SOUND MATCH */
function renderSoundMatch(g,body){
  const pairs=[{icon:'🐶',freq:330,name:'강아지'},{icon:'🐱',freq:500,name:'고양이'},{icon:'🐸',freq:200,name:'개구리'},{icon:'🔔',freq:660,name:'종소리'},{icon:'🎸',freq:440,name:'기타'},{icon:'🎺',freq:587,name:'트럼펫'}];
  let items=[...pairs,...pairs].map((s,i)=>({...s,id:i,rev:false,matched:false})).sort(()=>Math.random()-0.5);
  let flipped=[],score=0,locked=false;
  function render(){body.innerHTML=`
    <div class="c ts tc">같은 소리 카드 짝 맞추기!</div>
    <div class="scards mt16">${items.map((it,i)=>`<button class="scard ${it.matched?'match':it.rev?'flip':''}" id="sc${i}" onclick="window._sf(${i})">${it.matched||it.rev?it.icon:'?'}</button>`).join('')}</div>
    <div class="c ts tc mt12">맞춘 짝: ${score} / ${pairs.length}</div>
    <div class="msgb mt8" id="sm"></div>`}
  render();
  window._sf=(idx)=>{if(locked||items[idx].matched||items[idx].rev)return;items[idx].rev=true;playT(items[idx].freq,400,'sine');flipped.push(idx);render();if(flipped.length===2){locked=true;const[a,b]=flipped;setTimeout(()=>{if(items[a].name===items[b].name){items[a].matched=true;items[b].matched=true;score++;playOK();const m=document.getElementById('sm');if(m){m.textContent='짝 맞췄어요! 🎉';m.style.color='var(--green)'}flipped=[];if(score===pairs.length)setTimeout(()=>showResult(g,'완료!','소리 기억력이 뛰어나요!','🔊'),600)}else{items[a].rev=false;items[b].rev=false;playNG();flipped=[]}locked=false;render()},900)}};
}

/* GAME 7: STROOP */
function renderStroop(g,body){
  const items=[
    {word:'빨강',color:'#e74c3c',name:'빨강'},{word:'파랑',color:'#3498db',name:'파랑'},
    {word:'초록',color:'#27ae60',name:'초록'},{word:'노랑',color:'#f39c12',name:'노랑'},
  ];
  const colorBtns=[{c:'#e74c3c',n:'빨강'},{c:'#3498db',n:'파랑'},{c:'#27ae60',n:'초록'},{c:'#f39c12',n:'노랑'}];
  let round=0,total=8,score=0,tgt=null,t0=0;
  function render(){
    const wordItem=items[Math.floor(Math.random()*items.length)];
    const colorItem=items[Math.floor(Math.random()*items.length)];
    tgt=colorItem.name; t0=Date.now();
    body.innerHTML=`
      <div class="c ts tc">${round+1} / ${total} | 글자 <b>색깔</b>을 탭하세요!</div>
      <div class="pwrap mt8"><div class="pbar" style="width:${round/total*100}%"></div></div>
      <div style="font-size:56px;font-weight:700;text-align:center;margin:28px 0;color:${colorItem.color};text-shadow:2px 2px 6px rgba(0,0,0,0.12)">${wordItem.word}</div>
      <div class="c ts tc" style="margin-bottom:14px">이 글자의 <b>색깔</b>은 무엇인가요?</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        ${colorBtns.map(c=>`<button onclick="window._stpick('${c.n}')" style="padding:22px 0;border:none;border-radius:var(--r);background:${c.c};box-shadow:var(--ns);cursor:pointer;font-size:18px;font-weight:700;color:white;transition:all 0.15s;font-family:var(--fn)" onpointerdown="this.style.boxShadow='var(--np)'" onpointerup="this.style.boxShadow='var(--ns)'">${c.n}</button>`).join('')}
      </div>
      <div class="msgb mt12" id="stm"></div>`;
    window._stpick=(name)=>{
      const rt=Date.now()-t0;
      const m=document.getElementById('stm');
      if(name===tgt){score++;playOK();m.textContent=`정답! ✓  (${rt}ms)`;m.style.color='var(--green)';}
      else{playNG();m.textContent='틀렸어요. 색깔을 보세요!';m.style.color='var(--red)';}
      round++;
      setTimeout(()=>{if(round>=total)showResult(g,score+'/'+total+'점',score>=6?'집중력이 탁월해요!':'꾸준히 연습해요!','🔤');else render();},900);
    };
  }
  render();
}

/* GAME 8: ECHO */
function renderEcho(g,body){
  let round=0,total=6,score=0;
  function render(){
    const count=2+Math.floor(Math.random()*4);
    const freq=300+Math.floor(Math.random()*300);
    body.innerHTML=`
      <div class="c ts tc">${round+1} / ${total}</div>
      <div class="pwrap mt8"><div class="pbar" style="width:${round/total*100}%"></div></div>
      <div class="c mt20">
        <button class="nbtn acc" style="padding:20px 44px;font-size:20px" onclick="window._eplay(${count},${freq})">🔊 소리 듣기</button>
      </div>
      <div class="c ts tc mt16" style="font-size:16px;font-weight:700">소리가 몇 번 들렸나요?</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:20px">
        ${[1,2,3,4,5,6].map(n=>`<button onclick="window._epick(${n},${count})" style="padding:22px 0;border:none;border-radius:var(--rs);background:var(--bg);box-shadow:var(--ns);cursor:pointer;font-size:26px;font-weight:700;color:var(--text);font-family:var(--fn);transition:all 0.15s" onpointerdown="this.style.boxShadow='var(--np)'" onpointerup="this.style.boxShadow='var(--ns)'">${n}</button>`).join('')}
      </div>
      <div class="msgb mt12" id="ecm"></div>`;
    window._eplay=(cnt,f)=>{for(let i=0;i<cnt;i++)setTimeout(()=>playT(f,220,'sine',0.35),i*420);};
    setTimeout(()=>window._eplay(count,freq),300);
    window._epick=(chosen,correct)=>{
      const m=document.getElementById('ecm');
      if(chosen===correct){score++;playOK();m.textContent=`정답! ${correct}번이에요 🎵`;m.style.color='var(--green)';}
      else{playNG();m.textContent=`정답은 ${correct}번이에요`;m.style.color='var(--red)';}
      round++;
      setTimeout(()=>{if(round>=total)showResult(g,score+'/'+total+'점',score>=4?'청각 집중력이 뛰어나요!':'꾸준히 연습해요!','🔁');else render();},1200);
    };
  }
  render();
}

init();
</script>
