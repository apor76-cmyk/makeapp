<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2P 채팅</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root[data-theme="dark"] {
  --bg:#0d0d14; --surface:#13131e; --surface2:#1c1c2e; --surface3:#242438;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --accent:#6c63ff; --accent-l:#8b84ff; --accent2:#ff6584; --green:#43e97b;
  --text:#e2e2f0; --muted:#7a7a9a; --dim:#4a4a6a;
  --bme-s:#6c63ff; --bme-e:#9b8aff; --bthem:#1c1c2e; --bthem-b:rgba(255,255,255,0.07); --bthem-t:#e2e2f0;
  --hbg:rgba(13,13,20,0.75); --ibg:rgba(13,13,20,0.75);
  --blob1:rgba(108,99,255,0.13); --blob2:rgba(255,101,132,0.08);
  --tbg:#1c1c2e; --tborder:rgba(255,255,255,0.13);
  --shadow:0 40px 100px rgba(0,0,0,0.6); --sys:#1c1c2e; --code:#8b84ff;
}
:root[data-theme="light"] {
  --bg:#f0f0f7; --surface:#fff; --surface2:#f5f5fc; --surface3:#ebebf5;
  --border:rgba(0,0,0,0.07); --border2:rgba(0,0,0,0.12);
  --accent:#5a52e8; --accent-l:#5a52e8; --accent2:#e84d6b; --green:#22c55e;
  --text:#1a1a2e; --muted:#6b6b8a; --dim:#aaaabc;
  --bme-s:#5a52e8; --bme-e:#8070ff; --bthem:#f0f0f8; --bthem-b:rgba(0,0,0,0.08); --bthem-t:#1a1a2e;
  --hbg:rgba(255,255,255,0.85); --ibg:rgba(255,255,255,0.85);
  --blob1:rgba(108,99,255,0.07); --blob2:rgba(255,101,132,0.05);
  --tbg:#ebebf5; --tborder:rgba(0,0,0,0.1);
  --shadow:0 40px 100px rgba(100,100,160,0.15); --sys:#ebebf5; --code:#5a52e8;
}

body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;transition:background .3s,color .3s}
.blob1,.blob2{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;transition:background .3s}
.blob1{width:420px;height:420px;background:var(--blob1);top:-120px;left:-100px}
.blob2{width:360px;height:360px;background:var(--blob2);bottom:-80px;right:-80px}

.app{position:relative;z-index:1;width:100%;max-width:480px;min-height:100vh;display:flex;flex-direction:column;background:var(--surface);border-left:1px solid var(--border);border-right:1px solid var(--border);transition:background .3s,border-color .3s}
@media(min-width:520px){.app{min-height:700px;max-height:700px;border-radius:22px;border:1px solid var(--border);box-shadow:var(--shadow)}}

.screen{display:none;flex-direction:column;flex:1}.screen.active{display:flex}

/* theme toggle */
.theme-toggle{position:absolute;top:16px;right:16px;z-index:10;width:52px;height:28px;background:var(--tbg);border:1px solid var(--tborder);border-radius:50px;cursor:pointer;display:flex;align-items:center;padding:3px;transition:background .3s,border-color .3s}
.toggle-thumb{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-l));display:flex;align-items:center;justify-content:center;font-size:12px;transition:transform .3s cubic-bezier(.4,0,.2,1)}
[data-theme="light"] .toggle-thumb{transform:translateX(24px)}
[data-theme="dark"]  .toggle-thumb{transform:translateX(0)}

/* setup */
.setup{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;gap:24px}
.logo{font-size:38px;font-weight:700;letter-spacing:-2px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:12px;color:var(--muted);margin-top:5px;text-align:center}
.card{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;display:flex;flex-direction:column;gap:14px;transition:background .3s,border-color .3s}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:0.8px;text-transform:uppercase}
.field input{background:var(--surface3);border:1px solid var(--border);border-radius:11px;padding:11px 14px;color:var(--text);font-family:inherit;font-size:14px;outline:none;width:100%;transition:border-color .2s,background .3s,color .3s}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--dim)}

/* room code display */
.room-display{display:flex;flex-direction:column;gap:6px}
.room-display-label{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:0.8px;text-transform:uppercase}
.room-code-box{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface3);border:2px dashed var(--border2);border-radius:14px;padding:14px 18px;cursor:pointer;transition:border-color .2s,background .3s}
.room-code-box:hover{border-color:var(--accent)}
.room-code-chars{display:flex;gap:8px;align-items:center}
.room-code-char{font-size:26px;font-weight:700;font-family:monospace;color:var(--code);letter-spacing:1px;transition:color .3s}
.room-code-sep{width:6px;height:6px;border-radius:50%;background:var(--border2)}
.copy-btn-sm{font-size:18px;flex-shrink:0;opacity:0.7}

.divider{display:flex;align-items:center;gap:10px;color:var(--dim);font-size:11px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* short code input */
.code-input-row{display:flex;gap:8px;align-items:center}
.code-input-big{flex:1;background:var(--surface3);border:1px solid var(--border);border-radius:11px;padding:13px 18px;color:var(--text);font-family:monospace;font-size:22px;font-weight:700;letter-spacing:5px;text-align:center;outline:none;text-transform:uppercase;transition:border-color .2s,background .3s,color .3s}
.code-input-big:focus{border-color:var(--accent)}
.code-input-big::placeholder{color:var(--dim);font-size:14px;letter-spacing:1px;font-weight:400}

.btn{border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;border-radius:11px;padding:12px 20px;transition:all .18s;width:100%}
.btn:active{transform:scale(0.97)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-l));color:#fff;box-shadow:0 4px 18px rgba(108,99,255,0.28)}
.btn-primary:hover{opacity:0.88}

.info-pill{background:rgba(108,99,255,0.08);border:1px solid rgba(108,99,255,0.18);border-radius:50px;padding:7px 14px;font-size:11px;color:var(--accent-l);text-align:center;line-height:1.6}
[data-theme="light"] .info-pill{color:var(--accent)}

.connecting-state{display:none;flex-direction:column;align-items:center;gap:10px;padding:10px 0}
.connecting-state.show{display:flex}
.spinner{width:26px;height:26px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.connecting-text{font-size:12px;color:var(--muted)}

/* chat */
.header{display:flex;align-items:center;gap:11px;padding:13px 16px;border-bottom:1px solid var(--border);background:var(--hbg);backdrop-filter:blur(14px);flex-shrink:0;transition:background .3s,border-color .3s}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;background:linear-gradient(135deg,var(--accent2),#ff9a9e)}
.hinfo{flex:1}
.hname{font-size:14px;font-weight:500}
.hstatus{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;margin-top:2px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.header-right{display:flex;align-items:center;gap:8px}
.mini-toggle{width:44px;height:24px;background:var(--tbg);border:1px solid var(--tborder);border-radius:50px;cursor:pointer;display:flex;align-items:center;padding:3px;transition:background .3s}
.mini-thumb{width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-l));display:flex;align-items:center;justify-content:center;font-size:10px;transition:transform .3s cubic-bezier(.4,0,.2,1)}
[data-theme="light"] .mini-thumb{transform:translateX(20px)}
[data-theme="dark"]  .mini-thumb{transform:translateX(0)}
.leave-btn{background:transparent;border:1px solid var(--border2);border-radius:8px;padding:5px 11px;color:var(--muted);font-size:11px;font-family:inherit;cursor:pointer;transition:all .2s}
.leave-btn:hover{border-color:var(--accent2);color:var(--accent2)}

.messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:3px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.msg-row{display:flex;flex-direction:column;max-width:78%;animation:pop .18s ease}
@keyframes pop{from{opacity:0;transform:translateY(6px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.msg-row.me{align-self:flex-end;align-items:flex-end}
.msg-row.them{align-self:flex-start;align-items:flex-start}
.bubble{padding:9px 14px;font-size:14px;line-height:1.55;word-break:break-word}
.me .bubble{background:linear-gradient(135deg,var(--bme-s),var(--bme-e));color:#fff;border-radius:18px 18px 4px 18px}
.them .bubble{background:var(--bthem);border:1px solid var(--bthem-b);color:var(--bthem-t);border-radius:18px 18px 18px 4px;transition:background .3s,border-color .3s,color .3s}
.msg-time{font-size:10px;color:var(--dim);margin:3px 4px 0}
.sender-lbl{font-size:10px;color:var(--accent2);margin:0 4px 3px;font-weight:500}
.sys{align-self:center;font-size:11px;color:var(--dim);background:var(--sys);border:1px solid var(--border);border-radius:50px;padding:3px 12px;margin:4px 0;transition:background .3s}
.typing{align-self:flex-start;display:none;gap:4px;padding:10px 14px;background:var(--bthem);border:1px solid var(--bthem-b);border-radius:18px 18px 18px 4px;margin-bottom:4px;transition:background .3s}
.typing.show{display:flex}
.td{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:bounce 1.1s infinite}
.td:nth-child(2){animation-delay:.18s}.td:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

.input-area{display:flex;align-items:flex-end;gap:8px;padding:11px 13px;border-top:1px solid var(--border);background:var(--ibg);backdrop-filter:blur(14px);flex-shrink:0;transition:background .3s,border-color .3s}
.msg-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:13px;padding:10px 14px;color:var(--text);font-family:inherit;font-size:14px;outline:none;resize:none;max-height:96px;line-height:1.5;transition:border-color .2s,background .3s,color .3s;overflow-y:auto}
.msg-input:focus{border-color:rgba(108,99,255,0.45)}
.msg-input::placeholder{color:var(--dim)}
.send-btn{width:42px;height:42px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent-l));color:#fff;font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .18s;box-shadow:0 3px 12px rgba(108,99,255,0.3)}
.send-btn:hover{box-shadow:0 3px 18px rgba(108,99,255,0.5)}
.send-btn:active{transform:scale(0.93)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface3);border:1px solid var(--border2);border-radius:50px;padding:8px 18px;font-size:13px;color:var(--text);opacity:0;transition:opacity .3s;pointer-events:none;z-index:99;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="blob1"></div>
<div class="blob2"></div>
<div class="toast" id="toast"></div>

<div class="app">
  <button class="theme-toggle" onclick="toggleTheme()" title="테마 전환">
    <div class="toggle-thumb">🌙</div>
  </button>

  <!-- SETUP -->
  <div class="screen active" id="setupScreen">
    <div class="setup">
      <div style="text-align:center">
        <div class="logo">채팅</div>
        <div class="logo-sub">P2P 실시간 대화 · 서버 없음</div>
      </div>

      <div class="card">
        <div class="field">
          <label>내 이름</label>
          <input type="text" id="nameInput" placeholder="닉네임 입력" maxlength="16" />
        </div>

        <!-- 내 방 코드 -->
        <div class="room-display">
          <div class="room-display-label">내 방 코드 (클릭하여 복사)</div>
          <div class="room-code-box" onclick="copyCode()" title="복사">
            <div class="room-code-chars" id="codeChars">
              <span class="room-code-char">·</span>
              <span class="room-code-char">·</span>
              <span class="room-code-char">·</span>
              <div class="room-code-sep"></div>
              <span class="room-code-char">·</span>
              <span class="room-code-char">·</span>
            </div>
            <span class="copy-btn-sm">📋</span>
          </div>
        </div>

        <div class="divider">상대방 코드로 연결</div>

        <!-- 상대방 코드 입력 (5글자) -->
        <div class="field">
          <label>상대방 방 코드 (5자리)</label>
          <input
            class="code-input-big"
            type="text"
            id="peerInput"
            placeholder="예: AB3K9"
            maxlength="5"
            oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')"
          />
        </div>

        <button class="btn btn-primary" onclick="connectToPeer()">연결하기 →</button>

        <div class="connecting-state" id="connectingState">
          <div class="spinner"></div>
          <div class="connecting-text">연결 중... 상대방이 접속할 때까지 기다려요</div>
        </div>

        <div class="info-pill">💡 5자리 코드를 카톡으로 공유하세요. 상대방이 입력하면 바로 연결돼요!</div>
      </div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="screen" id="chatScreen">
    <div class="header">
      <div class="av" id="theirAv">?</div>
      <div class="hinfo">
        <div class="hname" id="theirName">상대방</div>
        <div class="hstatus">
          <div class="dot" id="connDot"></div>
          <span id="connLabel">연결됨</span>
        </div>
      </div>
      <div class="header-right">
        <button class="mini-toggle" onclick="toggleTheme()">
          <div class="mini-thumb">🌙</div>
        </button>
        <button class="leave-btn" onclick="leaveChat()">나가기</button>
      </div>
    </div>

    <div class="messages" id="messages"></div>
    <div class="typing" id="typingInd">
      <div class="td"></div><div class="td"></div><div class="td"></div>
    </div>

    <div class="input-area">
      <textarea class="msg-input" id="msgInput" placeholder="메시지를 입력하세요..." rows="1"
        onkeydown="handleKey(event)" oninput="handleTyping()"></textarea>
      <button class="send-btn" onclick="send()">↑</button>
    </div>
  </div>
</div>

<script>
let peer, conn, myName='', theirName='', myShortCode='';
let typingTimer, isTyping=false;

// ── THEME ──
applyTheme(localStorage.getItem('chatTheme') || 'dark');
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  const icon = t==='dark' ? '🌙' : '☀️';
  document.querySelectorAll('.toggle-thumb,.mini-thumb').forEach(el=>el.textContent=icon);
  localStorage.setItem('chatTheme', t);
}
function toggleTheme() {
  applyTheme(document.documentElement.getAttribute('data-theme')==='dark' ? 'light' : 'dark');
}

// ── SHORT CODE HELPERS ──
// Generate a random 5-char alphanumeric code (uppercase, no ambiguous chars)
const CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no 0,O,1,I
function makeCode() {
  let c = '';
  for (let i=0; i<5; i++) c += CHARS[Math.floor(Math.random()*CHARS.length)];
  return c;
}

// PeerJS peer ID = "chat5_" + shortCode (host uses _H, guest uses _G suffix to avoid collision)
function hostPeerId(code)  { return 'chat5_' + code + '_H'; }
function guestPeerId(code) { return 'chat5_' + code + '_G'; }

function renderCode(code) {
  const chars = document.getElementById('codeChars');
  chars.innerHTML = '';
  for (let i=0; i<5; i++) {
    if (i===3) { // separator after 2 chars
      const sep = document.createElement('div'); sep.className='room-code-sep'; chars.appendChild(sep);
    }
    const span = document.createElement('span'); span.className='room-code-char';
    span.textContent = code[i] || '·'; chars.appendChild(span);
  }
}

// ── PEER INIT ──
function initPeer() {
  myShortCode = makeCode();
  renderCode(myShortCode);

  // Register as HOST with short-code-based peer ID
  peer = new Peer(hostPeerId(myShortCode), {
    host:'0.peerjs.com', port:443, path:'/', secure:true,
    config:{iceServers:[
      {urls:'stun:stun.l.google.com:19302'},
      {urls:'stun:stun1.l.google.com:19302'}
    ]}
  });

  peer.on('open', () => { /* ready */ });

  // Someone connected TO us (we are the host)
  peer.on('connection', c => {
    setupConn(c);
    addSys('상대방이 연결했습니다');
    showChat();
  });

  peer.on('error', e => {
    // If ID is taken (someone else has same code), regenerate
    if (e.type === 'unavailable-id') {
      myShortCode = makeCode();
      renderCode(myShortCode);
      peer.destroy();
      initPeer();
    } else {
      showToast('오류: ' + e.type);
      document.getElementById('connectingState').classList.remove('show');
    }
  });
}

// ── CONNECT AS GUEST ──
function connectToPeer() {
  const name = document.getElementById('nameInput').value.trim();
  const code = document.getElementById('peerInput').value.trim().toUpperCase();
  if (!name) { showToast('이름을 입력해주세요!'); return; }
  if (code.length !== 5) { showToast('5자리 코드를 입력해주세요!'); return; }
  if (code === myShortCode) { showToast('내 코드는 입력할 수 없어요!'); return; }

  myName = name;
  document.getElementById('connectingState').classList.add('show');

  // Destroy current host peer, re-register as guest
  peer.destroy();
  peer = new Peer(guestPeerId(code + Math.random().toString(36).slice(2,6)), {
    host:'0.peerjs.com', port:443, path:'/', secure:true,
    config:{iceServers:[
      {urls:'stun:stun.l.google.com:19302'},
      {urls:'stun:stun1.l.google.com:19302'}
    ]}
  });

  peer.on('open', () => {
    const c = peer.connect(hostPeerId(code), { reliable: true });
    c.on('open', () => {
      setupConn(c);
      addSys('연결됐습니다! 🎉');
      showChat();
    });
    c.on('error', () => {
      showToast('연결 실패. 코드를 확인해주세요.');
      document.getElementById('connectingState').classList.remove('show');
    });
    setTimeout(() => {
      if (!conn || !conn.open) {
        showToast('연결 실패. 코드를 확인하거나 상대방이 접속 중인지 확인하세요.');
        document.getElementById('connectingState').classList.remove('show');
      }
    }, 10000);
  });

  peer.on('error', e => {
    showToast('오류: ' + e.type);
    document.getElementById('connectingState').classList.remove('show');
  });
}

// ── CONNECTION SETUP ──
function setupConn(c) {
  conn = c;
  conn.on('open', () => conn.send({ type:'name', name:myName }));
  conn.on('data', d => {
    if (d.type==='name') {
      theirName = d.name;
      document.getElementById('theirName').textContent = theirName;
      document.getElementById('theirAv').textContent = theirName.charAt(0).toUpperCase();
    } else if (d.type==='msg') {
      addMsg(theirName, d.text, 'them');
    } else if (d.type==='typing') {
      document.getElementById('typingInd').classList.toggle('show', d.v);
      scrollBottom();
    }
  });
  conn.on('close', () => {
    addSys('상대방이 연결을 끊었습니다');
    document.getElementById('connDot').style.cssText='background:#888;box-shadow:none';
    document.getElementById('connLabel').textContent='오프라인';
  });
}

function showChat() {
  const name = document.getElementById('nameInput').value.trim();
  if (name) myName = name;
  document.getElementById('setupScreen').classList.remove('active');
  document.getElementById('chatScreen').classList.add('active');
}

// ── MESSAGING ──
function send() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !conn || !conn.open) return;
  conn.send({ type:'msg', text });
  addMsg(myName, text, 'me');
  input.value = ''; input.style.height = 'auto';
  if (isTyping) { isTyping=false; conn.send({ type:'typing', v:false }); }
}

function handleKey(e) { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); send(); } }

function handleTyping() {
  const inp = document.getElementById('msgInput');
  inp.style.height='auto'; inp.style.height=Math.min(inp.scrollHeight,96)+'px';
  if (!conn||!conn.open) return;
  if (!isTyping) { isTyping=true; conn.send({type:'typing',v:true}); }
  clearTimeout(typingTimer);
  typingTimer = setTimeout(()=>{ isTyping=false; conn.send({type:'typing',v:false}); }, 1500);
}

function addMsg(sender, text, side) {
  const box = document.getElementById('messages');
  const row = document.createElement('div'); row.className='msg-row '+side;
  if (side==='them') { const l=document.createElement('div'); l.className='sender-lbl'; l.textContent=sender; row.appendChild(l); }
  const b=document.createElement('div'); b.className='bubble'; b.textContent=text; row.appendChild(b);
  const t=document.createElement('div'); t.className='msg-time';
  const now=new Date(); t.textContent=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  row.appendChild(t); box.appendChild(row); scrollBottom();
}

function addSys(text) {
  const box=document.getElementById('messages');
  const el=document.createElement('div'); el.className='sys'; el.textContent=text;
  box.appendChild(el); scrollBottom();
}

function scrollBottom() { const b=document.getElementById('messages'); b.scrollTop=b.scrollHeight; }

function copyCode() {
  navigator.clipboard.writeText(myShortCode).then(()=>showToast('코드 복사됨: '+myShortCode+' 📋'));
}

function leaveChat() { if(conn) conn.close(); location.reload(); }

function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000);
}

initPeer();
</script>
</body>
</html>
