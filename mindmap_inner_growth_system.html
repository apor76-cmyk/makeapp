<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내면 성장 종합 시스템</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-page:radial-gradient(circle at center,#eef3f9,#dde6f2);
  --bg-detail:#fff;--border-detail:rgba(0,0,0,0.08);--shadow-detail:rgba(0,0,0,0.08);
  --text-title:#1a1a1a;--text-sub:#6b7280;
  --node-fill-purple:#EEEDFE;--node-stroke-purple:#7F77DD;--node-title-purple:#3C3489;
  --node-fill-teal:#E1F5EE;--node-stroke-teal:#1D9E75;--node-title-teal:#085041;
  --node-fill-amber:#FAEEDA;--node-stroke-amber:#EF9F27;--node-title-amber:#633806;
  --node-fill-coral:#FAECE7;--node-stroke-coral:#F0997B;--node-title-coral:#993C1D;
  --node-fill-blue:#E6F1FB;--node-stroke-blue:#85B7EB;--node-title-blue:#0C447C;
  --node-fill-pink:#FBEAF0;--node-stroke-pink:#D4537E;--node-title-pink:#993556;
  --link-opacity:0.45;--center-sub:#CECBF6;
  --toggle-bg:#e2e8f0;--toggle-thumb:#fff;
  --edit-bar:#f8fafc;--edit-bar-border:rgba(0,0,0,0.1);
  --edit-btn:#fff;--edit-btn-border:rgba(0,0,0,0.15);--edit-btn-hover:#f0f4ff;
  --edit-active:#5A64C7;--drag-hint:#5A64C7;
}
[data-theme=dark]{
  --bg-page:radial-gradient(circle at center,#1a2133,#111827);
  --bg-detail:#1e2635;--border-detail:rgba(255,255,255,0.07);--shadow-detail:rgba(0,0,0,0.35);
  --text-title:#f1f5f9;--text-sub:#94a3b8;
  --node-fill-purple:#252B74;--node-stroke-purple:#534AB7;--node-title-purple:#CECBF6;
  --node-fill-teal:#04342C;--node-stroke-teal:#0F6E56;--node-title-teal:#9FE1CB;
  --node-fill-amber:#412402;--node-stroke-amber:#854F0B;--node-title-amber:#FAC775;
  --node-fill-coral:#4A1B0C;--node-stroke-coral:#993C1D;--node-title-coral:#F5C4B3;
  --node-fill-blue:#042C53;--node-stroke-blue:#185FA5;--node-title-blue:#B5D4F4;
  --node-fill-pink:#3E1E50;--node-stroke-pink:#993556;--node-title-pink:#F4C0D1;
  --link-opacity:0.3;--center-sub:#7F77DD;
  --toggle-bg:#3b4a6b;--toggle-thumb:#1e2635;
  --edit-bar:#1e2635;--edit-bar-border:rgba(255,255,255,0.1);
  --edit-btn:#2a3550;--edit-btn-border:rgba(255,255,255,0.15);--edit-btn-hover:#354060;
  --edit-active:#7F77DD;--drag-hint:#9f97f0;
}
body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;background:var(--bg-page);color:var(--text-title);transition:background .3s,color .3s;min-height:100vh;}
#wrap{display:flex;flex-direction:column;align-items:center;padding:16px 0 40px}
#topbar{width:min(1000px,96vw);display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.map-title{font-size:15px;font-weight:600;color:var(--text-title)}
.map-hint{font-size:11px;color:var(--text-sub);opacity:.75;margin-top:2px}
.topbar-right{display:flex;align-items:center;gap:10px}
.toggle-btn{display:flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer;font-size:12px;font-weight:500;color:var(--text-sub);padding:6px 0;transition:color .2s;}
.toggle-btn:hover{color:var(--text-title)}
.toggle-track{width:40px;height:22px;border-radius:11px;background:var(--toggle-bg);position:relative;transition:background .3s;flex-shrink:0;}
.toggle-thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:var(--toggle-thumb);transition:transform .3s;display:flex;align-items:center;justify-content:center;font-size:10px;line-height:1;}
[data-theme=dark] .toggle-thumb{transform:translateX(18px)}
#edit-mode-btn{font-size:12px;font-weight:500;padding:6px 14px;border-radius:8px;border:.5px solid var(--edit-btn-border);background:var(--edit-btn);color:var(--text-title);cursor:pointer;transition:all .15s;white-space:nowrap;}
#edit-mode-btn:hover{background:var(--edit-btn-hover)}
#edit-mode-btn.active{background:var(--edit-active);color:#fff;border-color:transparent;}
#edit-toolbar{width:min(1000px,96vw);display:none;background:var(--edit-bar);border:.5px solid var(--edit-bar-border);border-radius:12px;padding:10px 14px;margin-bottom:10px;align-items:center;gap:8px;flex-wrap:wrap;}
#edit-toolbar.visible{display:flex}
.edit-hint{font-size:11px;color:var(--drag-hint);flex:1;min-width:200px;}
.edit-hint b{font-weight:600}
.toolbar-btns{display:flex;gap:6px;flex-wrap:wrap;}
.tb-btn{font-size:11px;font-weight:500;padding:5px 11px;border-radius:7px;border:.5px solid var(--edit-btn-border);background:var(--edit-btn);color:var(--text-title);cursor:pointer;transition:background .15s;white-space:nowrap;}
.tb-btn:hover{background:var(--edit-btn-hover)}
.svg-scroll{width:min(1000px,100vw);overflow-x:auto;padding-bottom:4px}
svg#mm{display:block;width:1000px;height:900px;}
.link{fill:none;stroke-width:1.6;}
.child-link{fill:none;stroke-width:1;}
.node-g{cursor:pointer;}
.node-g:hover rect,.node-g:hover ellipse{opacity:.82}
.node-title{font-size:12px;font-weight:600;text-anchor:middle;dominant-baseline:central;pointer-events:none;}
.node-sub{font-size:10px;text-anchor:middle;dominant-baseline:central;pointer-events:none;}
.child-title{font-size:11px;font-weight:500;text-anchor:middle;dominant-baseline:central;pointer-events:none;}
.edit-mode .node-g{cursor:grab;}
.edit-mode .node-g:active{cursor:grabbing;}
.edit-mode .node-g rect,.edit-mode .node-g ellipse{stroke-dasharray:4 2;}
.drag-active rect,.drag-active ellipse{stroke-dasharray:none!important;filter:drop-shadow(0 4px 12px rgba(127,119,221,.45));}
.popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:20px}
.popup-overlay.open{display:flex}
.popup-box{background:var(--bg-detail);border-radius:16px;max-width:560px;width:100%;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 20px 60px var(--shadow-detail);overflow:hidden;border:.5px solid var(--border-detail)}
.popup-header{display:flex;align-items:flex-start;justify-content:space-between;padding:18px 20px 14px;border-bottom:.5px solid var(--border-detail);gap:12px}
.popup-title{font-size:15px;font-weight:600;color:var(--text-title);line-height:1.3}
.popup-source{font-size:11px;color:var(--text-sub);margin-top:2px}
.popup-close{width:28px;height:28px;border-radius:8px;border:none;background:var(--border-detail);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text-sub);flex-shrink:0;}
.popup-close:hover{opacity:.7}
.popup-body{padding:18px 20px;overflow-y:auto;flex:1}
.popup-items{display:flex;flex-direction:column;gap:8px}
.popup-item{background:var(--bg-page);border-radius:10px;padding:10px 14px;font-size:12px;line-height:1.7;color:var(--text-title);border-left:3px solid transparent}
.popup-quote{font-size:13px;font-style:italic;color:var(--text-sub);border-left:3px solid;padding-left:12px;margin-top:12px;line-height:1.7}
</style>
</head>
<body>
<div class="popup-overlay" id="popup" onclick="closePopupOutside(event)">
  <div class="popup-box">
    <div class="popup-header">
      <div><div class="popup-title" id="popup-title"></div><div class="popup-source" id="popup-source"></div></div>
      <button class="popup-close" onclick="closePopup()">✕</button>
    </div>
    <div class="popup-body" id="popup-body"></div>
  </div>
</div>
<div id="wrap">
<div id="topbar">
  <div>
    <div class="map-title">내면 성장 종합 시스템</div>
    <div class="map-hint" id="main-hint">💡 노드를 클릭하면 상세 내용을 볼 수 있습니다</div>
  </div>
  <div class="topbar-right">
    <button id="edit-mode-btn" onclick="toggleEditMode()">✏️ 노드 위치 수정</button>
    <button class="toggle-btn" onclick="toggleTheme()">
      <span id="toggle-label">다크모드</span>
      <div class="toggle-track"><div class="toggle-thumb" id="toggle-thumb">🌙</div></div>
    </button>
  </div>
</div>
<div id="edit-toolbar">
  <span class="edit-hint"><b>✏️ 편집 모드</b> — 노드를 드래그해서 자유롭게 위치를 바꾸세요 (터치 지원)</span>
  <div class="toolbar-btns">
    <button class="tb-btn" onclick="spreadMore()">↔ 더 넓게</button>
    <button class="tb-btn" onclick="spreadLess()">↕ 더 좁게</button>
    <button class="tb-btn" onclick="resetLayout()">🔄 초기화</button>
    <button class="tb-btn" onclick="toggleEditMode()">✅ 편집 완료</button>
  </div>
</div>
<div class="svg-scroll">
<svg id="mm" viewBox="0 0 1000 900" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="gc" x1="0" y1="0" x2="1" y2="1">
    <stop id="gca" offset="0%" stop-color="#7F77DD"/>
    <stop id="gcb" offset="100%" stop-color="#3C3489"/>
  </linearGradient>
</defs>
<g id="links"></g>
<g id="nodes"></g>
</svg>
</div>
</div>
<script>
const CX=500,CY=450;
const NS='http://www.w3.org/2000/svg';
const PW=132,PH=52,CW=110,CH=44;

const clusters=[
  {key:'watching',label:'마음 관찰',sub:'왓칭',cat:'purple',
   children:[{key:'watching-observe',label:'생각을\n바라보기'},{key:'watching-observer',label:'관찰자로\n살아가기'},{key:'watching-empty',label:'텅 빈\n의식 상태'}]},
  {key:'attraction',label:'감정·끌어당김',sub:'끌어당김의 법칙',cat:'teal',
   children:[{key:'attraction-feeling',label:'이미 이룬\n감정'},{key:'attraction-gratitude',label:'감사·충만\n상태'},{key:'intuition',label:'직감\n따르기'}]},
  {key:'meditation',label:'명상·수행',sub:'달라이 라마',cat:'amber',
   children:[{key:'meditation-focus',label:'집중\n명상'},{key:'meditation-analysis',label:'분석\n명상'},{key:'meditation-daily',label:'일상\n수행'}]},
  {key:'detach',label:'집착 내려놓기',sub:'달마 조사',cat:'coral',
   children:[{key:'detach-pain',label:'고통은\n신호'},{key:'detach-karma',label:'번뇌\n이해하기'},{key:'detach-ego',label:'자아 집착\n줄이기'}]},
  {key:'present',label:'현재 순간',sub:'에크하르트 톨레',cat:'blue',
   children:[{key:'present-resist',label:'저항\n멈추기'},{key:'present-surrender',label:'내맡김'},{key:'present-painbody',label:'고통체\n알아차리기'}]},
  {key:'selftrust',label:'자기 신뢰·수용',sub:'칼 융',cat:'pink',
   children:[{key:'selftrust-compare',label:'비교\n내려놓기'},{key:'selftrust-shadow',label:'그림자\n통합'},{key:'selftrust-imperfect',label:'불완전함\n수용'}]},
];

const CAT_COLORS={
  purple:{stroke:'#534AB7',linkStroke:'#7F77DD'},
  teal:{stroke:'#1D9E75',linkStroke:'#1D9E75'},
  amber:{stroke:'#EF9F27',linkStroke:'#BA7517'},
  coral:{stroke:'#F0997B',linkStroke:'#993C1D'},
  blue:{stroke:'#85B7EB',linkStroke:'#185FA5'},
  pink:{stroke:'#D4537E',linkStroke:'#D4537E'},
};

/* 기본 위치 계산 — 겹치지 않는 고정 좌표 */
function calcDefaultPos(){
  const pos={};
  const N=clusters.length;
  const R_P=195, R_C=118, SPREAD=0.40;
  clusters.forEach((cl,i)=>{
    const angle=(i/N)*Math.PI*2-Math.PI/2;
    const px=CX+R_P*Math.cos(angle);
    const py=CY+R_P*Math.sin(angle);
    pos[cl.key]={x:px,y:py};
    const nc=cl.children.length;
    cl.children.forEach((ch,j)=>{
      const ca=angle+(j-(nc-1)/2)*SPREAD;
      pos[ch.key]={x:px+R_C*Math.cos(ca),y:py+R_C*Math.sin(ca)};
    });
  });
  return pos;
}

let DEFAULT_POS=calcDefaultPos();
let positions=JSON.parse(JSON.stringify(DEFAULT_POS));

/* 링크/노드 요소 참조 */
const linkEls={};
const nodeGEls={};

function getCSSVar(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}
function svgE(tag,attrs){const e=document.createElementNS(NS,tag);for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);return e;}

function buildSVG(){
  document.getElementById('links').innerHTML='';
  document.getElementById('nodes').innerHTML='';
  Object.keys(linkEls).forEach(k=>delete linkEls[k]);
  Object.keys(nodeGEls).forEach(k=>delete nodeGEls[k]);
  const lop=getCSSVar('--link-opacity')||'0.45';

  clusters.forEach(cl=>{
    const p=positions[cl.key];
    const cc=CAT_COLORS[cl.cat];
    const fill=getCSSVar('--node-fill-'+cl.cat);
    const stroke=getCSSVar('--node-stroke-'+cl.cat);
    const tc=getCSSVar('--node-title-'+cl.cat);

    /* center→parent */
    const pp=svgE('path',{class:'link',d:`M ${CX} ${CY} Q ${(CX+p.x)/2} ${(CY+p.y)/2} ${p.x} ${p.y}`,stroke:cc.linkStroke});
    pp.style.opacity=lop;
    document.getElementById('links').appendChild(pp);
    linkEls[cl.key]={parentPath:pp,childLines:[]};

    /* parent g */
    const pg=svgE('g',{class:'node-g'});
    pg.dataset.key=cl.key; pg.dataset.isParent='1';
    pg.onclick=()=>{if(!editMode)showPopup(cl.key);};
    pg.appendChild(svgE('rect',{x:p.x-PW/2,y:p.y-PH/2,rx:11,width:PW,height:PH,fill,stroke,'stroke-width':1}));
    const pt1=svgE('text',{class:'node-title',x:p.x,y:p.y-8,fill:tc}); pt1.textContent=cl.label;
    const pt2=svgE('text',{class:'node-sub',x:p.x,y:p.y+10,fill:tc}); pt2.style.opacity='0.65'; pt2.textContent=cl.sub;
    pg.appendChild(pt1); pg.appendChild(pt2);
    makeDraggable(pg,cl.key);
    document.getElementById('nodes').appendChild(pg);
    nodeGEls[cl.key]=pg;

    cl.children.forEach(ch=>{
      const cp=positions[ch.key];
      const cl2=svgE('line',{x1:p.x,y1:p.y,x2:cp.x,y2:cp.y,class:'child-link',stroke:cc.stroke});
      cl2.style.opacity='0.5';
      document.getElementById('links').appendChild(cl2);
      linkEls[cl.key].childLines.push({line:cl2,childKey:ch.key});

      const cg=svgE('g',{class:'node-g'});
      cg.dataset.key=ch.key; cg.dataset.parentKey=cl.key;
      cg.onclick=()=>{if(!editMode)showPopup(ch.key);};
      cg.appendChild(svgE('rect',{x:cp.x-CW/2,y:cp.y-CH/2,rx:9,width:CW,height:CH,fill,stroke,'stroke-width':0.7}));
      const lines=ch.label.split('\n');
      if(lines.length===1){
        const t=svgE('text',{class:'child-title',x:cp.x,y:cp.y,fill:tc}); t.textContent=lines[0]; cg.appendChild(t);
      } else {
        const t1=svgE('text',{class:'child-title',x:cp.x,y:cp.y-8,fill:tc}); t1.textContent=lines[0];
        const t2=svgE('text',{class:'child-title',x:cp.x,y:cp.y+9,fill:tc}); t2.textContent=lines[1];
        cg.appendChild(t1); cg.appendChild(t2);
      }
      makeDraggable(cg,ch.key);
      document.getElementById('nodes').appendChild(cg);
      nodeGEls[ch.key]=cg;
    });
  });

  /* center */
  const cg=svgE('g',{class:'node-g'});
  cg.onclick=()=>{if(!editMode)showPopup('center');};
  const el=svgE('ellipse',{cx:CX,cy:CY,rx:82,ry:42,fill:'url(#gc)',stroke:'#3C3489','stroke-width':1});
  cg.appendChild(el);
  const ct=svgE('text',{class:'node-title',x:CX,y:CY-11,fill:'#fff'}); ct.style.fontSize='13px'; ct.textContent='내면 성장';
  const cs=svgE('text',{class:'node-sub',x:CX,y:CY+7,fill:getCSSVar('--center-sub')}); cs.style.fontSize='10px'; cs.textContent='종합 시스템';
  const ch=svgE('text',{class:'node-sub',x:CX,y:CY+21,fill:getCSSVar('--center-sub')}); ch.style.fontSize='9px'; ch.textContent='클릭해서 개요 보기';
  cg.appendChild(ct); cg.appendChild(cs); cg.appendChild(ch);
  document.getElementById('nodes').appendChild(cg);
  nodeGEls['center']=cg;
}

function updateNodePos(key){
  const g=nodeGEls[key]; if(!g) return;
  const p=positions[key];
  const isP=!!g.dataset.isParent;
  const W=isP?PW:CW, H=isP?PH:CH;
  const rect=g.querySelector('rect');
  if(rect){rect.setAttribute('x',p.x-W/2); rect.setAttribute('y',p.y-H/2);}
  const texts=g.querySelectorAll('text');
  if(isP){
    if(texts[0]){texts[0].setAttribute('x',p.x); texts[0].setAttribute('y',p.y-8);}
    if(texts[1]){texts[1].setAttribute('x',p.x); texts[1].setAttribute('y',p.y+10);}
  } else {
    if(texts.length===1){texts[0].setAttribute('x',p.x); texts[0].setAttribute('y',p.y);}
    else if(texts.length>=2){
      texts[0].setAttribute('x',p.x); texts[0].setAttribute('y',p.y-8);
      texts[1].setAttribute('x',p.x); texts[1].setAttribute('y',p.y+9);
    }
  }
}

function updateAllLinks(movedKey){
  clusters.forEach(cl=>{
    const le=linkEls[cl.key]; if(!le) return;
    const pp=positions[cl.key];
    if(movedKey===cl.key){
      le.parentPath.setAttribute('d',`M ${CX} ${CY} Q ${(CX+pp.x)/2} ${(CY+pp.y)/2} ${pp.x} ${pp.y}`);
    }
    le.childLines.forEach(({line,childKey})=>{
      if(movedKey===cl.key||movedKey===childKey){
        const cp=positions[childKey];
        line.setAttribute('x1',pp.x); line.setAttribute('y1',pp.y);
        line.setAttribute('x2',cp.x); line.setAttribute('y2',cp.y);
      }
    });
  });
}

/* ── 드래그 ── */
let editMode=false;
let dragging=null;

function getSVGScale(){
  const r=document.getElementById('mm').getBoundingClientRect();
  return{sx:1000/r.width,sy:900/r.height,left:r.left,top:r.top};
}

function makeDraggable(g,key){
  function start(mx,my){
    const{sx,sy,left,top}=getSVGScale();
    dragging={key,g,
      smx:(mx-left)*sx,smy:(my-top)*sy,
      spx:positions[key].x,spy:positions[key].y};
    g.classList.add('drag-active');
  }
  g.addEventListener('mousedown',e=>{if(!editMode)return; e.preventDefault(); e.stopPropagation(); start(e.clientX,e.clientY);});
  g.addEventListener('touchstart',e=>{if(!editMode)return; e.preventDefault(); const t=e.touches[0]; start(t.clientX,t.clientY);},{passive:false});
}

document.addEventListener('mousemove',e=>{
  if(!dragging)return;
  const{sx,sy,left,top}=getSVGScale();
  positions[dragging.key].x=dragging.spx+(e.clientX-left)*sx-dragging.smx;
  positions[dragging.key].y=dragging.spy+(e.clientY-top)*sy-dragging.smy;
  updateNodePos(dragging.key);
  updateAllLinks(dragging.key);
});
document.addEventListener('mouseup',()=>{if(dragging){dragging.g.classList.remove('drag-active');dragging=null;}});
document.addEventListener('touchmove',e=>{
  if(!dragging)return; e.preventDefault();
  const t=e.touches[0];
  const{sx,sy,left,top}=getSVGScale();
  positions[dragging.key].x=dragging.spx+(t.clientX-left)*sx-dragging.smx;
  positions[dragging.key].y=dragging.spy+(t.clientY-top)*sy-dragging.smy;
  updateNodePos(dragging.key);
  updateAllLinks(dragging.key);
},{passive:false});
document.addEventListener('touchend',()=>{if(dragging){dragging.g.classList.remove('drag-active');dragging=null;}});

/* ── 편집 모드 ── */
function toggleEditMode(){
  editMode=!editMode;
  const btn=document.getElementById('edit-mode-btn');
  const tb=document.getElementById('edit-toolbar');
  const hint=document.getElementById('main-hint');
  const svg=document.getElementById('mm');
  if(editMode){
    btn.textContent='✅ 편집 완료'; btn.classList.add('active');
    tb.classList.add('visible');
    hint.textContent='✏️ 편집 모드 — 노드를 드래그해서 이동하세요';
    svg.classList.add('edit-mode');
  } else {
    btn.textContent='✏️ 노드 위치 수정'; btn.classList.remove('active');
    tb.classList.remove('visible');
    hint.textContent='💡 노드를 클릭하면 상세 내용을 볼 수 있습니다';
    svg.classList.remove('edit-mode');
  }
}
function resetLayout(){positions=JSON.parse(JSON.stringify(DEFAULT_POS));buildSVG();}
function spreadMore(){
  Object.keys(positions).forEach(k=>{positions[k].x=CX+(positions[k].x-CX)*1.13;positions[k].y=CY+(positions[k].y-CY)*1.13;});
  buildSVG();
}
function spreadLess(){
  Object.keys(positions).forEach(k=>{positions[k].x=CX+(positions[k].x-CX)*0.87;positions[k].y=CY+(positions[k].y-CY)*0.87;});
  buildSVG();
}

let isDark=false;
function toggleTheme(){
  isDark=!isDark;
  document.documentElement.setAttribute('data-theme',isDark?'dark':'');
  document.getElementById('toggle-label').textContent=isDark?'라이트모드':'다크모드';
  document.getElementById('toggle-thumb').textContent=isDark?'☀️':'🌙';
  buildSVG();
}

function showPopup(key){
  const d=POPUP_DATA[key]; if(!d) return;
  document.getElementById('popup-title').textContent=d.title;
  document.getElementById('popup-source').textContent=d.source;
  let html='<div class="popup-items">';
  d.items.forEach(item=>{html+=`<div class="popup-item" style="border-left-color:${d.color}">${item}</div>`;});
  html+='</div>';
  if(d.quote) html+=`<div class="popup-quote" style="border-left-color:${d.color}">${d.quote}</div>`;
  document.getElementById('popup-body').innerHTML=html;
  document.getElementById('popup').classList.add('open');
}
function closePopup(){document.getElementById('popup').classList.remove('open');}
function closePopupOutside(e){if(e.target.id==='popup') closePopup();}
document.addEventListener('keydown',e=>{if(e.key==='Escape') closePopup();});

buildSVG();
</script>
