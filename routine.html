
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-page: radial-gradient(circle at center,#eef3f9,#dde6f2);
  --bg-detail:#fff;
  --border-detail:rgba(0,0,0,0.08);
  --shadow-detail:rgba(0,0,0,0.08);
  --text-empty:#9ca3af;
  --text-title:#1a1a1a;
  --text-sub:#6b7280;
  --node-fill-green:#E1F5EE; --node-stroke-green:#5DCAA5; --node-title-green:#085041;
  --node-fill-amber:#FAEEDA; --node-stroke-amber:#EF9F27; --node-title-amber:#633806;
  --node-fill-coral:#FAECE7; --node-stroke-coral:#F0997B; --node-title-coral:#712B13;
  --node-fill-blue:#E6F1FB; --node-stroke-blue:#85B7EB; --node-title-blue:#0C447C;
  --link-opacity:0.45;
  --center-grad-a:#378ADD; --center-grad-b:#185FA5;
  --center-sub:#B5D4F4;
  --toggle-bg:#e2e8f0; --toggle-thumb:#fff; --toggle-icon-l:1; --toggle-icon-d:0;
}
[data-theme=dark]{
  --bg-page: radial-gradient(circle at center,#1a2133,#111827);
  --bg-detail:#1e2635;
  --border-detail:rgba(255,255,255,0.07);
  --shadow-detail:rgba(0,0,0,0.35);
  --text-empty:#6b7280;
  --text-title:#f1f5f9;
  --text-sub:#94a3b8;
  --node-fill-green:#04342C; --node-stroke-green:#0F6E56; --node-title-green:#9FE1CB;
  --node-fill-amber:#412402; --node-stroke-amber:#854F0B; --node-title-amber:#FAC775;
  --node-fill-coral:#4A1B0C; --node-stroke-coral:#993C1D; --node-title-coral:#F5C4B3;
  --node-fill-blue:#042C53; --node-stroke-blue:#185FA5; --node-title-blue:#B5D4F4;
  --link-opacity:0.3;
  --center-grad-a:#185FA5; --center-grad-b:#0C447C;
  --center-sub:#378ADD;
  --toggle-bg:#3b4a6b; --toggle-thumb:#1e2635; --toggle-icon-l:0; --toggle-icon-d:1;
}
body{
  font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;
  background:var(--bg-page);
  color:var(--text-title);
  transition:background .3s,color .3s;
}
#wrap{display:flex;flex-direction:column;align-items:center;padding:16px 0 40px}

#topbar{
  width:min(680px,96vw);
  display:flex;justify-content:flex-end;
  margin-bottom:8px;
}
.toggle-btn{
  display:flex;align-items:center;gap:8px;
  background:none;border:none;cursor:pointer;
  font-size:12px;font-weight:500;color:var(--text-sub);
  padding:6px 0;transition:color .2s;
}
.toggle-btn:hover{color:var(--text-title)}
.toggle-track{
  width:40px;height:22px;border-radius:11px;
  background:var(--toggle-bg);
  position:relative;transition:background .3s;
  flex-shrink:0;
}
.toggle-thumb{
  position:absolute;top:3px;left:3px;
  width:16px;height:16px;border-radius:50%;
  background:var(--toggle-thumb);
  transition:transform .3s,background .3s;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;line-height:1;
}
[data-theme=dark] .toggle-thumb{transform:translateX(18px)}

svg#mm{width:min(680px,100vw);height:min(560px,80vw);overflow:visible}
.link{fill:none;stroke-width:1.8;transition:opacity .3s}
.node-g{cursor:pointer}
.node-g:hover rect,.node-g:hover ellipse{opacity:.85}
.node-title{font-size:12px;font-weight:600;text-anchor:middle;dominant-baseline:central;pointer-events:none;transition:fill .3s}
.node-sub{font-size:10px;text-anchor:middle;dominant-baseline:central;pointer-events:none;transition:fill .3s}

#detail{
  width:min(640px,96vw);
  margin-top:8px;
  background:var(--bg-detail);
  border:.5px solid var(--border-detail);
  border-radius:16px;
  box-shadow:0 4px 20px var(--shadow-detail);
  overflow:hidden;
  transition:background .3s,border .3s,box-shadow .3s;
}
#detail-empty{
  padding:28px 24px;
  font-size:13px;
  color:var(--text-empty);
  text-align:center;
  transition:color .3s;
}
#detail-inner{display:none;padding:20px 24px}
#detail-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
#detail-icon{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
#detail-title{font-size:15px;font-weight:600;color:var(--text-title);line-height:1.3;transition:color .3s}
#detail-tag{
  font-size:11px;font-weight:500;
  padding:2px 9px;border-radius:99px;
  margin-top:3px;display:inline-block;
}
#detail-body{font-size:13px;color:var(--text-sub);line-height:1.75;transition:color .3s}
#detail-body strong{color:var(--text-title);font-weight:600;transition:color .3s}
#detail-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px}
.dtag{
  font-size:11.5px;font-weight:500;
  padding:3px 10px;border-radius:99px;
  display:inline-block;
}
</style>

<div id="wrap">
<div id="topbar">
  <button class="toggle-btn" onclick="toggleTheme()" aria-label="다크모드 전환">
    <span id="toggle-label">다크모드</span>
    <div class="toggle-track">
      <div class="toggle-thumb" id="toggle-thumb">🌙</div>
    </div>
  </button>
</div>

<svg id="mm" viewBox="0 0 680 520">
<defs>
  <linearGradient id="gc" x1="0" y1="0" x2="1" y2="1">
    <stop id="gca" offset="0%" stop-color="#378ADD"/>
    <stop id="gcb" offset="100%" stop-color="#185FA5"/>
  </linearGradient>
</defs>
<g id="links"></g>
<g id="nodes"></g>
</svg>

<div id="detail">
  <div id="detail-empty">노드를 클릭하면 상세 내용이 여기에 표시됩니다</div>
  <div id="detail-inner">
    <div id="detail-header">
      <div id="detail-icon"></div>
      <div>
        <div id="detail-title"></div>
        <span id="detail-tag"></span>
      </div>
    </div>
    <div id="detail-body"></div>
    <div id="detail-tags"></div>
  </div>
</div>
</div>

  icon:'🌱',cat:'blue',

  body:'루틴은 단순한 습관의 반복이 아닙니다. 흔들리는 일상 속에서 <strong>자신이 원하는 삶의 방향을 매일 몸으로 선언하는 행위</strong>예요.',
  body2:'도파민 과자극으로 무뎌진 감각을 되살리고, 몰입과 현존, 철학적 태도가 하루하루 쌓여 루틴이 됩니다. 각 노드를 클릭해 상세 내용을 확인하세요.',
  tags:['지루함 견디기','정리정돈','현재 집중','1년 몰입','탁월함','현존'],
  tagCats:['green','green','green','amber','coral','blue']

const svg=document.getElementById('mm');
const linksG=document.getElementById('links');
const nodesG=document.getElementById('nodes');

function getCSSVar(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim()}

function buildSVG(){
  linksG.innerHTML='';nodesG.innerHTML='';

  const W=148,H=58;
  const strokeColors={green:'#1D9E75',amber:'#BA7517',coral:'#993C1D',blue:'#185FA5'};

  nodes.forEach((d,i)=>{
    const angle=(i/nodes.length)*Math.PI*2-Math.PI/2;
    const nx=cx+r*Math.cos(angle);
    const ny=cy+r*Math.sin(angle);
    const mx=(cx+nx)/2;
    const my=(cy+ny)/2-24;
    const sc=strokeColors[d.cat];

    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M ${cx} ${cy} Q ${mx} ${my} ${nx} ${ny}`);
    path.setAttribute('class','link');
    path.setAttribute('stroke',sc);
    path.style.opacity=getCSSVar('--link-opacity')||'0.45';
    linksG.appendChild(path);

    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','node-g');
    g.onclick=()=>show(d.key);

    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',nx-W/2);rect.setAttribute('y',ny-H/2);
    rect.setAttribute('rx','12');rect.setAttribute('width',W);rect.setAttribute('height',H);
    rect.setAttribute('fill',getCSSVar('--node-fill-'+d.cat));
    rect.setAttribute('stroke',getCSSVar('--node-stroke-'+d.cat));
    rect.setAttribute('stroke-width','0.9');

    const t1=document.createElementNS('http://www.w3.org/2000/svg','text');
    t1.setAttribute('class','node-title');
    t1.setAttribute('x',nx);t1.setAttribute('y',ny-10);
    t1.setAttribute('fill',getCSSVar('--node-title-'+d.cat));
    t1.textContent=d.title;

    const t2=document.createElementNS('http://www.w3.org/2000/svg','text');
    t2.setAttribute('class','node-sub');
    t2.setAttribute('x',nx);t2.setAttribute('y',ny+10);
    t2.setAttribute('fill',getCSSVar('--node-title-'+d.cat));
    t2.style.opacity='0.65';
    t2.textContent=d.sub;

    g.appendChild(rect);g.appendChild(t1);g.appendChild(t2);
    nodesG.appendChild(g);
  });

  // center node
  const cg=document.createElementNS('http://www.w3.org/2000/svg','g');
  cg.setAttribute('class','node-g');cg.onclick=()=>show('root');
  const el=document.createElementNS('http://www.w3.org/2000/svg','ellipse');
  el.setAttribute('cx',cx);el.setAttribute('cy',cy);el.setAttribute('rx',72);el.setAttribute('ry',36);
  el.setAttribute('fill','url(#gc)');el.setAttribute('stroke','#0C447C');el.setAttribute('stroke-width','1');
  const ct=document.createElementNS('http://www.w3.org/2000/svg','text');
  ct.setAttribute('class','node-title');ct.setAttribute('x',cx);ct.setAttribute('y',cy-8);
  ct.setAttribute('fill','#fff');ct.style.fontSize='14px';ct.textContent='루틴';
  const cs=document.createElementNS('http://www.w3.org/2000/svg','text');
  cs.setAttribute('class','node-sub');cs.setAttribute('x',cx);cs.setAttribute('y',cy+10);
  cs.setAttribute('fill',getCSSVar('--center-sub'));cs.style.fontSize='10px';
  cs.textContent='클릭해서 개요 보기';
  cg.appendChild(el);cg.appendChild(ct);cg.appendChild(cs);
  nodesG.appendChild(cg);

  document.getElementById('gca').setAttribute('stop-color',getCSSVar('--center-grad-a'));
  document.getElementById('gcb').setAttribute('stop-color',getCSSVar('--center-grad-b'));
}

let isDark=false;
function toggleTheme(){
  isDark=!isDark;
  document.documentElement.setAttribute('data-theme',isDark?'dark':'');
  document.getElementById('toggle-label').textContent=isDark?'라이트모드':'다크모드';
  document.getElementById('toggle-thumb').textContent=isDark?'☀️':'🌙';
  document.body.style.background=getCSSVar('--bg-page');
  buildSVG();
}

buildSVG();

function getTagColors(cat){
  const isDarkMode=document.documentElement.getAttribute('data-theme')==='dark';
  const c=cats[cat];
  return {bg:isDarkMode?c.tagBgD:c.tagBgL, color:isDarkMode?c.tagColorD:c.tagColorL};
}

function show(key){
  const d=key==='root'?rootData:nodes.find(n=>n.key===key);
  if(!d)return;
  document.getElementById('detail-empty').style.display='none';
  const inner=document.getElementById('detail-inner');
  inner.style.display='block';

  const cat=cats[d.cat];
  const isDarkMode=document.documentElement.getAttribute('data-theme')==='dark';

  const iconEl=document.getElementById('detail-icon');
  iconEl.textContent=d.icon;
  iconEl.style.background=isDarkMode?cat.tagBgD:cat.tagBgL;

  document.getElementById('detail-title').textContent=d.title;

  const tagEl=document.getElementById('detail-tag');
  tagEl.textContent=d.tag;
  tagEl.style.background=isDarkMode?cat.tagBgD:cat.tagBgL;
  tagEl.style.color=isDarkMode?cat.tagColorD:cat.tagColorL;

  document.getElementById('detail-body').innerHTML=(d.body||'')+(d.body2?'<br><br>'+d.body2:'');

  const tagsEl=document.getElementById('detail-tags');
  tagsEl.innerHTML='';
  if(d.tags&&d.tags.length){
    d.tags.forEach((t,i)=>{
      const span=document.createElement('span');
      span.className='dtag';
      span.textContent=t;
      let tc;
      if(d.tagCats){tc=cats[d.tagCats[i]];}else{tc=cat;}
      span.style.background=isDarkMode?tc.tagBgD:tc.tagBgL;
      span.style.color=isDarkMode?tc.tagColorD:tc.tagColorL;
      tagsEl.appendChild(span);
    });
  }
  document.getElementById('detail').scrollIntoView({behavior:'smooth',block:'nearest'});
}
</script>
